<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BC-250 Power Controller - LED Lighting</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>

<body>
  <header class="header">
    <a href="/" class="logo" aria-label="Steam Machine logo">
      <img src="steam-machines.svg" alt="Steam Machines" width="180" height="50">
    </a>
    <nav class="navbar" role="navigation" aria-label="Main navigation">
      <a href="/">HOME</a>
      <a href="/led">LED</a>
      <a href="/update">UPDATE</a>
      <a href="/setup">SETUP</a>
    </nav>
  </header>

  <main class="home led-page">
    <div class="home-content" role="region" aria-labelledby="led-heading">
      <h1 id="led-heading">LED LIGHTING</h1>
      <p class="subtitle">ARGB channel control</p>

      <section class="led-control-panel" aria-label="LED lighting controls">
        <div class="led-preview-wrap">
          <div id="ledPreview" class="led-preview led-strip-preview" aria-hidden="true"></div>
          <div class="info-grid led-summary-grid">
            <div class="info-item led-state-item">
              <span class="info-label">LIGHT STATE</span>
              <span id="ledStateLabel" class="info-value">LOADING...</span>
            </div>
            <div class="info-item led-state-item">
              <span class="info-label">CHANNELS</span>
              <span id="channelSummary" class="info-value">--</span>
            </div>
          </div>
        </div>

        <div class="led-form">
          <label class="toggle-row" for="ledEnabled">
            <span class="info-label">POWER</span>
            <input id="ledEnabled" type="checkbox" role="switch" />
          </label>

          <label class="field-row" for="ledBrightness">
            <span class="info-label">GLOBAL BRIGHTNESS</span>
            <span id="brightnessValue" class="field-value">128</span>
            <input id="ledBrightness" type="range" min="0" max="255" value="128" />
          </label>

          <div id="channelControls" class="channel-controls"></div>

          <div class="button-group led-actions" role="group" aria-label="LED commands">
            <button id="saveLedBtn" class="btn power-on" type="button">
              <i class='bx bx-save'></i> SAVE
            </button>
            <button id="refreshLedBtn" class="btn" type="button">
              <i class='bx bx-refresh'></i> REFRESH
            </button>
          </div>
        </div>
      </section>

      <div class="status-panel">
        <p id="ledStatusMsg" role="status" aria-live="polite">LED CONTROL READY</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 BC-250 POWER CONTROLLER</p>
  </footer>

  <script>
const ledEnabled = document.getElementById('ledEnabled');
const ledBrightness = document.getElementById('ledBrightness');
const brightnessValue = document.getElementById('brightnessValue');
const ledPreview = document.getElementById('ledPreview');
const ledStateLabel = document.getElementById('ledStateLabel');
const channelSummary = document.getElementById('channelSummary');
const ledStatusMsg = document.getElementById('ledStatusMsg');
const channelControls = document.getElementById('channelControls');
const saveLedBtn = document.getElementById('saveLedBtn');
const refreshLedBtn = document.getElementById('refreshLedBtn');

const DEFAULT_EFFECTS = ['static', 'breathing', 'colorCycle', 'rainbow', 'sequential'];
const DEFAULT_CHANNELS = [
  {
    id: 1,
    enabled: true,
    pixels: 24,
    effect: 'static',
    color: [0, 217, 255],
    secondaryColor: [255, 77, 109],
    speed: 50,
    reverse: false,
  },
  {
    id: 2,
    enabled: true,
    pixels: 24,
    effect: 'breathing',
    color: [255, 77, 109],
    secondaryColor: [0, 255, 162],
    speed: 50,
    reverse: false,
  },
];

let supportedEffects = DEFAULT_EFFECTS.slice();
let maxPixelsPerChannel = 50;
let channelCount = 2;

function clampNumber(value, min, max, fallback = min) {
  const number = Number(value);
  if (!Number.isFinite(number)) return fallback;
  return Math.max(min, Math.min(max, Math.round(number)));
}

function clampByte(value) {
  return clampNumber(value, 0, 255, 0);
}

function hexToRgb(hex) {
  const value = hex.replace('#', '');
  return [
    parseInt(value.slice(0, 2), 16),
    parseInt(value.slice(2, 4), 16),
    parseInt(value.slice(4, 6), 16),
  ].map(clampByte);
}

function rgbToHex(rgb) {
  return rgb.map((value) => clampByte(value).toString(16).padStart(2, '0')).join('');
}

function setStatus(message, isError = false) {
  ledStatusMsg.textContent = message;
  ledStatusMsg.className = isError ? 'error' : '';
}

function normalizeChannel(channel, index) {
  const fallback = DEFAULT_CHANNELS[index] || DEFAULT_CHANNELS[0];
  const id = clampNumber(channel.id || index + 1, 1, channelCount, index + 1);
  const effect = supportedEffects.includes(channel.effect) ? channel.effect : fallback.effect;
  return {
    id,
    enabled: Boolean(channel.enabled),
    pixels: clampNumber(channel.pixels, 0, maxPixelsPerChannel, fallback.pixels),
    effect,
    color: Array.isArray(channel.color) && channel.color.length === 3
      ? channel.color.map(clampByte)
      : fallback.color.slice(),
    secondaryColor: Array.isArray(channel.secondaryColor) && channel.secondaryColor.length === 3
      ? channel.secondaryColor.map(clampByte)
      : fallback.secondaryColor.slice(),
    speed: clampNumber(channel.speed, 1, 100, fallback.speed),
    reverse: Boolean(channel.reverse),
  };
}

function channelTemplate(channel) {
  const effectOptions = supportedEffects.map((effect) => (
    `<option value="${effect}" ${channel.effect === effect ? 'selected' : ''}>${effect.toUpperCase()}</option>`
  )).join('');
  return `
    <section class="channel-card" data-channel-id="${channel.id}">
      <div class="channel-card-header">
        <h2>CHANNEL ${channel.id}</h2>
        <label class="compact-toggle" for="channel${channel.id}Enabled">
          <span class="info-label">ON</span>
          <input id="channel${channel.id}Enabled" data-field="enabled" type="checkbox" ${channel.enabled ? 'checked' : ''}>
        </label>
      </div>

      <label class="field-row" for="channel${channel.id}Pixels">
        <span class="info-label">LED COUNT</span>
        <span class="field-value" data-output="pixels">${channel.pixels}</span>
        <input id="channel${channel.id}Pixels" data-field="pixels" type="range" min="0" max="${maxPixelsPerChannel}" value="${channel.pixels}">
      </label>

      <label class="field-row" for="channel${channel.id}Effect">
        <span class="info-label">EFFECT</span>
        <select id="channel${channel.id}Effect" data-field="effect">${effectOptions}</select>
      </label>

      <div class="color-grid">
        <label class="field-row" for="channel${channel.id}Color">
          <span class="info-label">COLOR A</span>
          <input id="channel${channel.id}Color" data-field="color" class="color-input" type="color" value="#${rgbToHex(channel.color)}">
        </label>

        <label class="field-row" for="channel${channel.id}Secondary">
          <span class="info-label">COLOR B</span>
          <input id="channel${channel.id}Secondary" data-field="secondaryColor" class="color-input" type="color" value="#${rgbToHex(channel.secondaryColor)}">
        </label>
      </div>

      <label class="field-row" for="channel${channel.id}Speed">
        <span class="info-label">SPEED</span>
        <span class="field-value" data-output="speed">${channel.speed}</span>
        <input id="channel${channel.id}Speed" data-field="speed" type="range" min="1" max="100" value="${channel.speed}">
      </label>

      <label class="toggle-row" for="channel${channel.id}Reverse">
        <span class="info-label">REVERSE</span>
        <input id="channel${channel.id}Reverse" data-field="reverse" type="checkbox" ${channel.reverse ? 'checked' : ''}>
      </label>
    </section>
  `;
}

function renderChannelControls(channels) {
  channelControls.innerHTML = channels.map(channelTemplate).join('');
  channelControls.querySelectorAll('input, select').forEach((input) => {
    input.addEventListener('input', updateLivePreview);
    input.addEventListener('change', updateLivePreview);
  });
}

function collectChannelState(card) {
  const id = clampNumber(card.dataset.channelId, 1, channelCount, 1);
  const read = (field) => card.querySelector(`[data-field="${field}"]`);
  return normalizeChannel({
    id,
    enabled: read('enabled').checked,
    pixels: read('pixels').value,
    effect: read('effect').value,
    color: hexToRgb(read('color').value),
    secondaryColor: hexToRgb(read('secondaryColor').value),
    speed: read('speed').value,
    reverse: read('reverse').checked,
  }, id - 1);
}

function collectLedState() {
  const channels = [...channelControls.querySelectorAll('.channel-card')].map(collectChannelState);
  return {
    on: ledEnabled.checked,
    bri: clampByte(ledBrightness.value),
    channels,
  };
}

function effectGradient(channel) {
  const primary = channel.color;
  const secondary = channel.secondaryColor;
  const a = `rgb(${primary[0]}, ${primary[1]}, ${primary[2]})`;
  const b = `rgb(${secondary[0]}, ${secondary[1]}, ${secondary[2]})`;
  if (!channel.enabled || channel.pixels === 0) return '#11131d';
  if (channel.effect === 'static') return a;
  if (channel.effect === 'breathing') return `radial-gradient(circle, ${a}, rgba(${primary[0]}, ${primary[1]}, ${primary[2]}, 0.15))`;
  if (channel.effect === 'colorCycle') return `linear-gradient(90deg, ${a}, ${b})`;
  if (channel.effect === 'sequential') return `repeating-linear-gradient(${channel.reverse ? '-90deg' : '90deg'}, ${a} 0 12px, ${b} 12px 24px)`;
  return 'linear-gradient(90deg, #ff004c, #ffb300, #00ffa2, #00d9ff, #8b5cff)';
}

function renderPreview(channels, brightness, enabled) {
  ledPreview.innerHTML = '';
  const opacity = enabled && brightness > 0 ? Math.max(brightness / 255, 0.08) : 0.16;
  channels.forEach((channel) => {
    const strip = document.createElement('div');
    strip.className = 'led-preview-channel';
    strip.style.opacity = String(opacity);
    strip.style.background = effectGradient(channel);
    strip.style.animationDuration = `${Math.max(1, 6 - channel.speed / 20)}s`;
    strip.classList.toggle('is-animated', enabled && channel.enabled && channel.effect !== 'static');
    ledPreview.appendChild(strip);
  });
}

function updateSummary(channels, brightness, enabled) {
  brightnessValue.textContent = String(brightness);
  channelControls.querySelectorAll('.channel-card').forEach((card) => {
    const pixels = card.querySelector('[data-field="pixels"]');
    const speed = card.querySelector('[data-field="speed"]');
    const pixelOutput = card.querySelector('[data-output="pixels"]');
    const speedOutput = card.querySelector('[data-output="speed"]');
    if (pixels && pixelOutput) pixelOutput.textContent = String(clampNumber(pixels.value, 0, maxPixelsPerChannel, 0));
    if (speed && speedOutput) speedOutput.textContent = String(clampNumber(speed.value, 1, 100, 50));
  });

  const activeChannels = channels.filter((channel) => channel.enabled && channel.pixels > 0).length;
  const totalPixels = channels.reduce((sum, channel) => sum + channel.pixels, 0);
  ledStateLabel.textContent = enabled ? 'ON' : 'OFF';
  ledStateLabel.style.color = enabled ? '#00ffa2' : '#ff4d6d';
  channelSummary.textContent = `${activeChannels}/${channels.length} - ${totalPixels} LED`;
}

function updateLivePreview() {
  const state = collectLedState();
  const brightness = clampByte(state.bri);
  renderPreview(state.channels, brightness, state.on);
  updateSummary(state.channels, brightness, state.on);
}

function renderLedState(state) {
  supportedEffects = Array.isArray(state.supportedEffects) && state.supportedEffects.length
    ? state.supportedEffects
    : supportedEffects;
  maxPixelsPerChannel = clampNumber(state.maxPixelsPerChannel, 1, 50, maxPixelsPerChannel);
  channelCount = clampNumber(state.channelCount, 1, 2, channelCount);

  const brightness = clampByte(state.bri);
  const sourceChannels = Array.isArray(state.channels) && state.channels.length
    ? state.channels
    : DEFAULT_CHANNELS;
  const channels = sourceChannels.slice(0, channelCount).map(normalizeChannel);

  ledEnabled.checked = Boolean(state.on);
  ledBrightness.value = brightness;
  brightnessValue.textContent = String(brightness);
  renderChannelControls(channels);
  renderPreview(channels, brightness, ledEnabled.checked);
  updateSummary(channels, brightness, ledEnabled.checked);
}

async function loadLedState() {
  setStatus('LOADING LED STATE...');
  try {
    const response = await fetch('/api/led/state');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const state = await response.json();
    renderLedState(state);
    setStatus('LED CONTROL READY');
  } catch (error) {
    console.error('LED state error:', error);
    setStatus(`FAILED TO LOAD LED STATE: ${error.message}`, true);
  }
}

async function saveLedState() {
  const buttons = [saveLedBtn, refreshLedBtn];
  buttons.forEach((button) => { button.disabled = true; });
  setStatus('SAVING LED STATE...');

  try {
    const response = await fetch('/api/led/state', {
      method: 'POST',
      headers: {
        'Accept': 'text/plain',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(collectLedState()),
    });
    if (!response.ok) throw new Error(await response.text() || `HTTP ${response.status}`);
    setStatus('LED STATE SAVED');
    await loadLedState();
  } catch (error) {
    console.error('LED save error:', error);
    setStatus(`FAILED TO SAVE LED STATE: ${error.message}`, true);
  } finally {
    buttons.forEach((button) => { button.disabled = false; });
  }
}

['change', 'input'].forEach((eventName) => {
  ledEnabled.addEventListener(eventName, updateLivePreview);
  ledBrightness.addEventListener(eventName, updateLivePreview);
});

saveLedBtn.addEventListener('click', saveLedState);
refreshLedBtn.addEventListener('click', loadLedState);
document.addEventListener('DOMContentLoaded', loadLedState);
  </script>
</body>
</html>
