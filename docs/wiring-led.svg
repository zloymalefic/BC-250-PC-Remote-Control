<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">BC-250 ESP32 power and LED wiring diagram</title>
  <desc id="desc">Wiring diagram for ESP32 relay power control and optional external LED power gate.</desc>
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; }
      .panel-alt { fill: #0f172a; stroke: #475569; stroke-width: 2; }
      .title { fill: #f8fafc; font: 700 28px Arial, sans-serif; }
      .subtitle { fill: #cbd5e1; font: 16px Arial, sans-serif; }
      .label { fill: #f8fafc; font: 700 18px Arial, sans-serif; }
      .text { fill: #e2e8f0; font: 15px Arial, sans-serif; }
      .small { fill: #cbd5e1; font: 13px Arial, sans-serif; }
      .warn { fill: #fbbf24; font: 700 15px Arial, sans-serif; }
      .pin { fill: #1e293b; stroke: #64748b; stroke-width: 1.5; }
      .gpio { stroke: #38bdf8; stroke-width: 4; fill: none; }
      .relay { stroke: #22c55e; stroke-width: 4; fill: none; }
      .monitor { stroke: #a78bfa; stroke-width: 4; fill: none; }
      .power { stroke: #f97316; stroke-width: 5; fill: none; }
      .ground { stroke: #94a3b8; stroke-width: 4; fill: none; }
      .danger { stroke: #fb7185; stroke-width: 4; fill: none; }
      .data { stroke: #facc15; stroke-width: 3; stroke-dasharray: 8 8; fill: none; }
    </style>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#facc15"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="820"/>
  <text x="40" y="48" class="title">BC-250 ESP32 wiring with optional LED/ARGB power gate</text>
  <text x="40" y="76" class="subtitle">Relay power control remains isolated from the LED power driver. ESP32 GPIO never powers LED loads directly.</text>

  <rect x="40" y="120" width="260" height="560" rx="14" class="panel"/>
  <text x="70" y="158" class="label">ESP32 controller</text>
  <text x="70" y="185" class="small">Firmware pin authority: pins.h</text>

  <rect x="70" y="220" width="190" height="34" rx="6" class="pin"/>
  <text x="84" y="242" class="text">GPIO16 OPTO_PIN</text>
  <rect x="70" y="270" width="190" height="34" rx="6" class="pin"/>
  <text x="84" y="292" class="text">GPIO17 EXTRA_PIN</text>
  <rect x="70" y="320" width="190" height="34" rx="6" class="pin"/>
  <text x="84" y="342" class="text">GPIO4 PC_MONITOR</text>
  <rect x="70" y="370" width="190" height="34" rx="6" class="pin"/>
  <text x="84" y="392" class="text">GPIO22 BUTTON</text>
  <rect x="70" y="420" width="190" height="34" rx="6" class="pin"/>
  <text x="84" y="442" class="text">GPIO23 POWER_LED</text>
  <rect x="70" y="470" width="190" height="34" rx="6" class="pin"/>
  <text x="84" y="492" class="text">GPIO2 STATUS_LED</text>
  <rect x="70" y="520" width="190" height="34" rx="6" class="pin"/>
  <text x="84" y="542" class="text">LED_POWER_PIN</text>
  <rect x="70" y="585" width="190" height="34" rx="6" class="pin"/>
  <text x="84" y="607" class="text">ESP32 GND</text>

  <rect x="390" y="145" width="260" height="220" rx="14" class="panel-alt"/>
  <text x="420" y="183" class="label">2-channel relay board</text>
  <rect x="420" y="220" width="190" height="44" rx="8" class="pin"/>
  <text x="438" y="247" class="text">Relay 1: PSU control</text>
  <rect x="420" y="290" width="190" height="44" rx="8" class="pin"/>
  <text x="438" y="317" class="text">Relay 2: power pulse</text>

  <rect x="760" y="120" width="420" height="260" rx="14" class="panel"/>
  <text x="790" y="158" class="label">BC-250 / ATX side</text>
  <rect x="790" y="200" width="330" height="44" rx="8" class="pin"/>
  <text x="812" y="227" class="text">ATX PS_ON path through relay 1</text>
  <rect x="790" y="265" width="330" height="44" rx="8" class="pin"/>
  <text x="812" y="292" class="text">BC-250 power-button pins through relay 2</text>
  <rect x="790" y="330" width="330" height="34" rx="8" class="pin"/>
  <text x="812" y="352" class="text">TPMS1 pin 9 monitor signal</text>

  <rect x="390" y="455" width="260" height="210" rx="14" class="panel-alt"/>
  <text x="420" y="493" class="label">Physical controls</text>
  <rect x="420" y="535" width="190" height="44" rx="8" class="pin"/>
  <text x="438" y="562" class="text">Momentary button to GND</text>
  <rect x="420" y="600" width="190" height="34" rx="8" class="pin"/>
  <text x="438" y="622" class="text">Case LEDs / indicators</text>

  <rect x="760" y="455" width="420" height="260" rx="14" class="panel"/>
  <text x="790" y="493" class="label">Optional LED/ARGB power</text>
  <rect x="790" y="530" width="150" height="44" rx="8" class="pin"/>
  <text x="814" y="557" class="text">5 V LED PSU</text>
  <rect x="980" y="530" width="80" height="44" rx="8" class="pin"/>
  <text x="1006" y="557" class="text">Fuse</text>
  <rect x="790" y="615" width="170" height="44" rx="8" class="pin"/>
  <text x="810" y="642" class="text">MOSFET / load switch</text>
  <rect x="1010" y="615" width="130" height="44" rx="8" class="pin"/>
  <text x="1026" y="642" class="text">LED / ARGB load</text>
  <text x="790" y="697" class="warn">LED_POWER_PIN defaults to -1: disabled until explicitly assigned.</text>

  <path class="gpio" d="M260 237 C320 237 350 242 420 242" marker-end="url(#arrow-blue)"/>
  <path class="gpio" d="M260 287 C320 287 350 312 420 312" marker-end="url(#arrow-blue)"/>
  <path class="monitor" d="M790 347 C690 347 660 337 260 337" marker-end="url(#arrow-purple)"/>
  <path class="gpio" d="M260 387 C325 387 360 557 420 557" marker-end="url(#arrow-blue)"/>
  <path class="gpio" d="M260 437 C330 437 370 617 420 617" marker-end="url(#arrow-blue)"/>
  <path class="gpio" d="M260 487 C335 487 370 617 420 617" marker-end="url(#arrow-blue)"/>

  <path class="relay" d="M610 242 C680 242 715 222 790 222" marker-end="url(#arrow-green)"/>
  <path class="relay" d="M610 312 C680 312 715 287 790 287" marker-end="url(#arrow-green)"/>

  <path class="power" d="M940 552 L980 552" marker-end="url(#arrow-orange)"/>
  <path class="power" d="M1060 552 C1100 552 1125 585 1125 615" marker-end="url(#arrow-orange)"/>
  <path class="danger" d="M260 537 C500 537 615 637 790 637" marker-end="url(#arrow-red)"/>
  <path class="power" d="M960 637 L1010 637" marker-end="url(#arrow-orange)"/>
  <path class="ground" d="M790 574 C670 730 430 730 165 602" marker-end="url(#arrow-blue)"/>
  <path class="ground" d="M790 574 C900 740 1040 740 1075 659" marker-end="url(#arrow-blue)"/>

  <path class="data" d="M260 537 C500 500 810 500 1075 615" marker-end="url(#arrow-yellow)"/>
  <text x="842" y="508" class="small">Future ARGB data line, separate from power gate</text>

  <rect x="40" y="715" width="1140" height="64" rx="12" class="panel-alt"/>
  <text x="70" y="742" class="warn">Safety notes</text>
  <text x="70" y="766" class="small">Use a MOSFET/load switch rated for LED current, fuse the LED 5 V feed, share ground, and never connect LED 5 V to ESP32 3.3 V GPIO.</text>
</svg>
