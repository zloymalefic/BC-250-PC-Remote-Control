<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">BC-250 wiring diagram with optional LED power gate</title>
  <desc id="desc">ESP32 two relay board wiring for BC-250 power control, updated with an optional external LED/ARGB power gate using a MOSFET or load switch.</desc>
  <defs>
    <pattern id="grid-small" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="#d8dde6" stroke-width="1"/>
    </pattern>
    <pattern id="grid-large" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="url(#grid-small)"/>
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#b8c0cc" stroke-width="1.3"/>
    </pattern>
    <style>
      .bg { fill: #f3f5f8; }
      .label-box { fill: #fff; stroke: #d7dce4; stroke-width: 1.5; }
      .board { fill: #0f67a8; stroke: #0b4f83; stroke-width: 3; }
      .board-edge { fill: none; stroke: #d7f3ff; stroke-width: 4; opacity: .7; }
      .module { fill: #e7edf5; stroke: #9aa8b7; stroke-width: 2; }
      .relay { fill: #5f85a8; stroke: #2c4d69; stroke-width: 2; }
      .terminal { fill: #d9eef4; stroke: #7aa8b8; stroke-width: 2; }
      .terminal-hole { fill: #f8fafc; stroke: #8192a6; stroke-width: 2; }
      .esp { fill: #cfd4da; stroke: #8b96a3; stroke-width: 2; }
      .chip { fill: #252b33; stroke: #111827; stroke-width: 2; }
      .component { fill: #d8dee8; stroke: #798697; stroke-width: 1.5; }
      .title { fill: #111827; font: 700 20px 'Courier New', monospace; letter-spacing: .5px; }
      .label { fill: #111827; font: 700 17px 'Courier New', monospace; }
      .small { fill: #111827; font: 700 13px Arial, sans-serif; }
      .note { fill: #334155; font: 13px Arial, sans-serif; }
      .warning { fill: #b91c1c; font: 700 13px Arial, sans-serif; }
      .green { stroke: #39d353; }
      .red { stroke: #ef4444; }
      .orange { stroke: #f97316; }
      .black { stroke: #111827; }
      .brown { stroke: #5b1b12; }
      .purple { stroke: #a21caf; }
      .blue { stroke: #0ea5e9; }
      .yellow { stroke: #eab308; stroke-dasharray: 10 8; }
      .wire { fill: none; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wire-thin { fill: none; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
      .node { fill: #fff; stroke-width: 3; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <rect width="1280" height="760" fill="url(#grid-large)" opacity=".75"/>

  <rect x="22" y="24" width="290" height="44" rx="7" class="label-box"/>
  <text x="38" y="52" class="title">MOMENTARY LED POWER BUTTON</text>

  <rect x="410" y="24" width="270" height="44" rx="7" class="label-box"/>
  <text x="426" y="52" class="title">BC-250 TPMS1 CONNECTOR</text>

  <rect x="780" y="24" width="380" height="44" rx="7" class="label-box"/>
  <text x="798" y="52" class="title">BC-250 POWER BUTTON SOLDERING POINTS</text>

  <rect x="1040" y="238" width="170" height="188" rx="8" class="label-box"/>
  <text x="1064" y="270" class="label">PSU CONNECTOR</text>
  <text x="1092" y="314" class="small">GND</text>
  <text x="1082" y="358" class="small" fill="#087f23">PS_ON</text>
  <text x="1080" y="402" class="small" fill="#a21caf">+5VSB</text>

  <rect x="740" y="596" width="466" height="118" rx="8" class="label-box"/>
  <text x="758" y="626" class="label">OPTIONAL LED/ARGB POWER GATE</text>
  <text x="758" y="650" class="note">External 5V LED PSU + fuse + MOSFET/load switch</text>
  <text x="758" y="673" class="warning">DO NOT POWER LEDS FROM GPIO</text>
  <text x="758" y="696" class="note">LED_POWER_PIN defaults to -1 until wiring is verified</text>

  <rect x="90" y="100" width="92" height="92" rx="10" class="label-box"/>
  <text x="122" y="126" class="small" fill="#ef4444">+</text>
  <text x="158" y="126" class="small">-</text>
  <circle cx="116" cy="158" r="8" class="terminal-hole"/>
  <circle cx="156" cy="158" r="8" class="terminal-hole"/>
  <circle cx="136" cy="182" r="8" class="terminal-hole"/>

  <rect x="434" y="92" width="248" height="24" class="terminal"/>
  <text x="442" y="88" class="small">17</text>
  <text x="575" y="88" class="small">9</text>
  <circle cx="454" cy="104" r="7" class="terminal-hole"/>
  <circle cx="484" cy="104" r="7" class="terminal-hole"/>
  <circle cx="514" cy="104" r="7" class="terminal-hole"/>
  <circle cx="544" cy="104" r="7" class="terminal-hole"/>
  <circle cx="574" cy="104" r="7" class="terminal-hole"/>
  <circle cx="604" cy="104" r="7" class="terminal-hole"/>
  <circle cx="634" cy="104" r="7" class="terminal-hole"/>
  <circle cx="664" cy="104" r="7" class="terminal-hole"/>

  <g transform="translate(915 96)">
    <rect x="0" y="0" width="154" height="144" rx="8" class="module"/>
    <circle cx="32" cy="28" r="10" class="terminal-hole"/>
    <circle cx="72" cy="28" r="10" class="terminal-hole"/>
    <circle cx="112" cy="28" r="10" class="terminal-hole"/>
    <circle cx="32" cy="68" r="10" class="terminal-hole"/>
    <circle cx="72" cy="68" r="10" class="terminal-hole"/>
    <circle cx="32" cy="108" r="10" class="terminal-hole"/>
    <circle cx="72" cy="108" r="10" class="terminal-hole"/>
  </g>

  <g id="relay-board" transform="translate(260 246)">
    <rect x="0" y="0" width="620" height="346" rx="8" class="board"/>
    <rect x="10" y="10" width="600" height="326" rx="8" class="board-edge"/>
    <rect x="82" y="46" width="166" height="174" rx="5" class="esp"/>
    <rect x="112" y="76" width="112" height="116" rx="3" class="chip"/>
    <rect x="34" y="56" width="28" height="196" rx="4" class="component"/>
    <g fill="#d1d5db" stroke="#6b7280" stroke-width="1.4">
      <circle cx="48" cy="76" r="6"/><circle cx="48" cy="100" r="6"/><circle cx="48" cy="124" r="6"/><circle cx="48" cy="148" r="6"/>
      <circle cx="48" cy="172" r="6"/><circle cx="48" cy="196" r="6"/><circle cx="48" cy="220" r="6"/>
      <circle cx="270" cy="76" r="6"/><circle cx="270" cy="100" r="6"/><circle cx="270" cy="124" r="6"/><circle cx="270" cy="148" r="6"/>
      <circle cx="270" cy="172" r="6"/><circle cx="270" cy="196" r="6"/><circle cx="270" cy="220" r="6"/>
    </g>
    <rect x="330" y="60" width="124" height="150" rx="8" class="relay"/>
    <rect x="478" y="60" width="124" height="150" rx="8" class="relay"/>
    <text x="345" y="126" class="small" fill="#fff">RELAY 1</text>
    <text x="493" y="126" class="small" fill="#fff">RELAY 2</text>
    <rect x="314" y="12" width="134" height="52" rx="6" class="terminal"/>
    <rect x="464" y="12" width="134" height="52" rx="6" class="terminal"/>
    <circle cx="342" cy="38" r="10" class="terminal-hole"/>
    <circle cx="382" cy="38" r="10" class="terminal-hole"/>
    <circle cx="422" cy="38" r="10" class="terminal-hole"/>
    <circle cx="492" cy="38" r="10" class="terminal-hole"/>
    <circle cx="532" cy="38" r="10" class="terminal-hole"/>
    <circle cx="572" cy="38" r="10" class="terminal-hole"/>
    <rect x="432" y="286" width="160" height="44" rx="6" class="terminal"/>
    <text x="450" y="314" class="small">VCC  GND  5V</text>
    <circle cx="512" cy="308" r="10" class="terminal-hole"/>
    <circle cx="560" cy="308" r="10" class="terminal-hole"/>
  </g>

  <rect x="790" y="536" width="132" height="40" rx="7" class="label-box"/>
  <text x="808" y="561" class="small">5V LED PSU</text>
  <rect x="948" y="536" width="72" height="40" rx="7" class="label-box"/>
  <text x="968" y="561" class="small">FUSE</text>
  <rect x="788" y="660" width="190" height="40" rx="7" class="label-box"/>
  <text x="804" y="685" class="small">MOSFET / LOAD SWITCH</text>
  <rect x="1032" y="660" width="138" height="40" rx="7" class="label-box"/>
  <text x="1048" y="685" class="small">LED / ARGB LOAD</text>

  <circle cx="1098" cy="310" r="6" class="node black"/>
  <circle cx="1098" cy="354" r="6" class="node green"/>
  <circle cx="1098" cy="398" r="6" class="node purple"/>
  <circle cx="1098" cy="438" r="6" class="node black"/>

  <path class="wire green" d="M148 100 L148 72 L366 72 L366 322"/>
  <path class="wire red" d="M116 158 L116 216 L414 216 L414 284"/>
  <path class="wire brown" d="M156 158 L156 252 L510 252 L510 284"/>
  <path class="wire black" d="M136 182 L136 282 L260 282"/>

  <path class="wire red" d="M574 92 L574 64 L612 64 L612 284"/>
  <path class="wire brown" d="M454 116 L454 210 L602 210 L602 284"/>

  <path class="wire green" d="M948 96 L948 70 L742 70 L742 284"/>
  <path class="wire black" d="M958 164 L958 236 L880 236"/>
  <path class="wire green" d="M998 164 L998 354 L1098 354"/>

  <path class="wire black" d="M602 284 L602 224 L932 224 L932 310 L1098 310"/>
  <path class="wire green" d="M642 284 L642 238 L918 238 L918 354 L1098 354"/>
  <path class="wire purple" d="M1098 398 L1098 588 L820 588 L820 554 L790 554"/>
  <path class="wire black" d="M1098 438 L1098 620 L820 620 L820 574"/>
  <path class="wire black" d="M560 554 L560 720 L820 720 L820 574"/>
  <path class="wire purple" d="M560 554 L560 620 L1032 620 L1032 398"/>

  <path class="wire-thin blue" d="M530 246 L530 706 L788 680"/>
  <text x="548" y="700" class="small" fill="#0ea5e9">LED_POWER_PIN</text>
  <path class="wire orange" d="M922 556 L948 556"/>
  <path class="wire orange" d="M1020 556 L1100 556 L1100 660"/>
  <path class="wire orange" d="M978 680 L1032 680"/>
  <path class="wire black" d="M856 576 L856 638 L788 638 L788 680"/>
  <path class="wire black" d="M1100 700 L1100 720 L820 720"/>
  <path class="wire-thin yellow" d="M570 246 L650 520 L1100 660"/>
  <text x="826" y="642" class="small" fill="#b45309">Future ARGB data line</text>
</svg>
