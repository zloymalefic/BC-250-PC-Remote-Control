<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">BC-250 ESP32 relay wiring with optional LED power gate</title>
  <desc id="desc">Readable board-layout wiring diagram with a smaller ESP32 two-relay board mockup, separated wire routes, and optional external LED power gate.</desc>
  <defs>
    <pattern id="small-grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M12 0H0V12" fill="none" stroke="#dfe4ec" stroke-width="1"/>
    </pattern>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="url(#small-grid)"/>
      <path d="M60 0H0V60" fill="none" stroke="#c3cad5" stroke-width="1.2"/>
    </pattern>
    <style>
      .bg { fill: #f5f7fa; }
      .labelbox { fill: #fff; stroke: #d7dee8; stroke-width: 1.4; }
      .board { fill: #0c62a4; stroke: #07436f; stroke-width: 3; }
      .board-hi { fill: none; stroke: #d8f3ff; stroke-width: 3; opacity: .55; }
      .espmod { fill: #d8dde5; stroke: #7e8a99; stroke-width: 1.5; }
      .chip { fill: #2a3038; stroke: #111827; stroke-width: 1.5; }
      .relay { fill: #77a9d0; stroke: #2f638d; stroke-width: 1.5; }
      .terminal { fill: #dff4fa; stroke: #7fb2c2; stroke-width: 1.6; }
      .hole { fill: #f8fafc; stroke: #7b8794; stroke-width: 1.5; }
      .component { fill: #cfd8e3; stroke: #758195; stroke-width: 1.2; }
      .title { fill: #111827; font: 700 18px 'Courier New', monospace; }
      .label { fill: #111827; font: 700 14px 'Courier New', monospace; }
      .small { fill: #111827; font: 700 11px Arial, sans-serif; }
      .note { fill: #334155; font: 12px Arial, sans-serif; }
      .warn { fill: #b91c1c; font: 700 12px Arial, sans-serif; }
      .wire { fill: none; stroke-width: 3.8; stroke-linecap: round; stroke-linejoin: round; }
      .thinwire { fill: none; stroke-width: 2.7; stroke-linecap: round; stroke-linejoin: round; }
      .green { stroke: #2fb344; }
      .red { stroke: #ef4444; }
      .orange { stroke: #f97316; }
      .black { stroke: #111827; }
      .brown { stroke: #5b1b12; }
      .purple { stroke: #a21caf; }
      .blue { stroke: #0ea5e9; }
      .yellow { stroke: #d4a000; stroke-dasharray: 9 7; }
      .node { fill: #fff; stroke-width: 2.4; }
    </style>
  </defs>

  <rect width="1500" height="900" class="bg"/>
  <rect width="1500" height="900" fill="url(#grid)" opacity=".72"/>

  <rect x="34" y="24" width="292" height="42" rx="7" class="labelbox"/>
  <text x="50" y="51" class="title">MOMENTARY LED POWER BUTTON</text>

  <rect x="542" y="24" width="274" height="42" rx="7" class="labelbox"/>
  <text x="560" y="51" class="title">BC-250 TPMS1 CONNECTOR</text>

  <rect x="1000" y="24" width="408" height="42" rx="7" class="labelbox"/>
  <text x="1020" y="51" class="title">BC-250 POWER BUTTON SOLDERING POINTS</text>

  <rect x="1200" y="250" width="170" height="198" rx="8" class="labelbox"/>
  <text x="1222" y="280" class="label">PSU CONNECTOR</text>
  <text x="1250" y="325" class="small">GND</text>
  <text x="1240" y="369" class="small" fill="#087f23">PS_ON</text>
  <text x="1238" y="413" class="small" fill="#a21caf">+5VSB</text>

  <rect x="88" y="108" width="106" height="108" rx="10" class="labelbox"/>
  <text x="122" y="136" class="small" fill="#ef4444">+</text>
  <text x="162" y="136" class="small">-</text>
  <circle cx="118" cy="172" r="8" class="hole"/>
  <circle cx="162" cy="172" r="8" class="hole"/>
  <circle cx="140" cy="200" r="8" class="hole"/>

  <rect x="570" y="96" width="264" height="26" class="terminal"/>
  <text x="576" y="90" class="small">17</text>
  <text x="696" y="90" class="small">9</text>
  <circle cx="592" cy="109" r="6" class="hole"/>
  <circle cx="624" cy="109" r="6" class="hole"/>
  <circle cx="656" cy="109" r="6" class="hole"/>
  <circle cx="688" cy="109" r="6" class="hole"/>
  <circle cx="720" cy="109" r="6" class="hole"/>
  <circle cx="752" cy="109" r="6" class="hole"/>
  <circle cx="784" cy="109" r="6" class="hole"/>
  <circle cx="816" cy="109" r="6" class="hole"/>

  <g transform="translate(1060 92)">
    <rect x="0" y="0" width="156" height="146" rx="8" class="terminal"/>
    <circle cx="34" cy="30" r="10" class="hole"/>
    <circle cx="76" cy="30" r="10" class="hole"/>
    <circle cx="118" cy="30" r="10" class="hole"/>
    <circle cx="34" cy="74" r="10" class="hole"/>
    <circle cx="76" cy="74" r="10" class="hole"/>
    <circle cx="34" cy="118" r="10" class="hole"/>
    <circle cx="76" cy="118" r="10" class="hole"/>
  </g>

  <g id="esp32-two-relay-board" transform="translate(380 300)">
    <rect x="0" y="0" width="560" height="280" rx="10" class="board"/>
    <rect x="10" y="10" width="540" height="260" rx="9" class="board-hi"/>

    <rect x="58" y="48" width="160" height="148" rx="6" class="espmod"/>
    <rect x="90" y="80" width="98" height="84" rx="3" class="chip"/>
    <text x="102" y="126" class="small" fill="#fff">ESP32</text>
    <rect x="24" y="58" width="22" height="168" rx="4" class="component"/>
    <g fill="#d1d5db" stroke="#6b7280" stroke-width="1.2">
      <circle cx="36" cy="78" r="5"/><circle cx="36" cy="100" r="5"/><circle cx="36" cy="122" r="5"/><circle cx="36" cy="144" r="5"/>
      <circle cx="36" cy="166" r="5"/><circle cx="36" cy="188" r="5"/><circle cx="36" cy="210" r="5"/>
      <circle cx="238" cy="78" r="5"/><circle cx="238" cy="100" r="5"/><circle cx="238" cy="122" r="5"/><circle cx="238" cy="144" r="5"/>
      <circle cx="238" cy="166" r="5"/><circle cx="238" cy="188" r="5"/><circle cx="238" cy="210" r="5"/>
    </g>

    <rect x="292" y="54" width="110" height="122" rx="8" class="relay"/>
    <rect x="428" y="54" width="110" height="122" rx="8" class="relay"/>
    <text x="314" y="112" class="small" fill="#fff">RELAY 1</text>
    <text x="450" y="112" class="small" fill="#fff">RELAY 2</text>

    <rect x="282" y="14" width="122" height="42" rx="6" class="terminal"/>
    <rect x="418" y="14" width="122" height="42" rx="6" class="terminal"/>
    <circle cx="308" cy="35" r="8" class="hole"/>
    <circle cx="344" cy="35" r="8" class="hole"/>
    <circle cx="380" cy="35" r="8" class="hole"/>
    <circle cx="444" cy="35" r="8" class="hole"/>
    <circle cx="480" cy="35" r="8" class="hole"/>
    <circle cx="516" cy="35" r="8" class="hole"/>

    <rect x="392" y="226" width="134" height="38" rx="6" class="terminal"/>
    <text x="410" y="250" class="small">VCC  GND  5V</text>
    <circle cx="460" cy="245" r="8" class="hole"/>
    <circle cx="504" cy="245" r="8" class="hole"/>

    <circle cx="248" cy="78" r="4" fill="#ef4444"/>
    <text x="258" y="82" class="small">GPIO4 PC_MONITOR_PIN</text>
    <circle cx="248" cy="112" r="4" fill="#39d353"/>
    <text x="258" y="116" class="small">GPIO16 OPTO_PIN</text>
    <circle cx="248" cy="146" r="4" fill="#0ea5e9"/>
    <text x="258" y="150" class="small">GPIO17 EXTRA_PIN</text>
    <circle cx="248" cy="180" r="4" fill="#0ea5e9"/>
    <text x="258" y="184" class="small">LED_POWER_PIN</text>
  </g>

  <rect x="970" y="620" width="420" height="130" rx="8" class="labelbox"/>
  <text x="990" y="650" class="label">OPTIONAL LED/ARGB POWER GATE</text>
  <text x="990" y="674" class="note">External 5V LED PSU + fuse + MOSFET/load switch + LED/ARGB load</text>
  <text x="990" y="698" class="warn">DO NOT POWER LEDS FROM GPIO</text>
  <text x="990" y="722" class="note">LED_POWER_PIN defaults to -1 until wiring is verified</text>

  <rect x="950" y="520" width="124" height="40" rx="7" class="labelbox"/>
  <text x="968" y="545" class="small">5V LED PSU</text>
  <rect x="1102" y="520" width="70" height="40" rx="7" class="labelbox"/>
  <text x="1121" y="545" class="small">FUSE</text>
  <rect x="950" y="766" width="176" height="38" rx="7" class="labelbox"/>
  <text x="966" y="790" class="small">MOSFET / LOAD SWITCH</text>
  <rect x="1212" y="766" width="136" height="38" rx="7" class="labelbox"/>
  <text x="1228" y="790" class="small">LED / ARGB LOAD</text>

  <circle cx="1248" cy="322" r="5" class="node black"/>
  <circle cx="1248" cy="366" r="5" class="node green"/>
  <circle cx="1248" cy="410" r="5" class="node purple"/>
  <circle cx="1248" cy="452" r="5" class="node black"/>

  <path class="wire green" d="M162 108 L162 76 L688 76 L688 335"/>
  <path class="wire red" d="M118 172 L118 238 L694 238 L694 335"/>
  <path class="wire brown" d="M162 172 L162 258 L724 258 L724 335"/>
  <path class="wire black" d="M140 200 L140 282 L380 282"/>

  <path class="wire red" d="M720 96 L720 84 L740 84 L740 335"/>
  <path class="wire brown" d="M592 122 L592 226 L820 226 L820 335"/>

  <path class="wire green" d="M1094 92 L1094 72 L796 72 L796 335"/>
  <path class="wire black" d="M1094 166 L1094 238 L940 238"/>
  <path class="wire green" d="M1136 166 L1136 366 L1248 366"/>
  <path class="wire black" d="M820 335 L820 322 L1248 322"/>
  <path class="wire purple" d="M1248 410 L1248 506 L1012 506 L1012 520"/>
  <path class="wire black" d="M1248 452 L1248 596 L1012 596 L1012 560"/>

  <path class="wire black" d="M1012 560 L1012 606 L840 606 L840 545"/>
  <path class="wire purple" d="M884 545 L884 600 L1212 600 L1212 410"/>

  <path class="thinwire blue" d="M628 480 L628 784 L950 784"/>
  <text x="646" y="772" class="small" fill="#0ea5e9">LED_POWER_PIN gate / enable</text>
  <path class="wire orange" d="M1074 540 L1102 540"/>
  <path class="wire orange" d="M1172 540 L1280 540 L1280 766"/>
  <path class="wire orange" d="M1126 784 L1212 784"/>
  <path class="wire black" d="M1012 560 L1012 740 L950 740 L950 784"/>
  <path class="wire black" d="M1280 804 L1280 842 L1012 842 L1012 560"/>
  <path class="thinwire yellow" d="M670 480 C840 560 1030 650 1280 766"/>
  <text x="1040" y="608" class="small" fill="#b45309">future ARGB data line, not enabled yet</text>
</svg>
