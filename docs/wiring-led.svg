<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">BC-250 wiring diagram with LED power gate</title>
  <desc id="desc">Readable wiring diagram for ESP32 relay board BC-250 power control and optional LED or ARGB external power gate.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .grid { stroke: #dce3ec; stroke-width: 1; }
      .box { fill: #fff; stroke: #1f2937; stroke-width: 2.5; }
      .subbox { fill: #f8fafc; stroke: #64748b; stroke-width: 1.8; }
      .header { fill: #0f172a; font: 700 30px Arial, sans-serif; }
      .title { fill: #111827; font: 700 21px Arial, sans-serif; }
      .txt { fill: #111827; font: 16px Arial, sans-serif; }
      .small { fill: #374151; font: 14px Arial, sans-serif; }
      .pin { fill: #111827; font: 700 15px Arial, sans-serif; }
      .warn { fill: #b91c1c; font: 700 16px Arial, sans-serif; }
      .green { stroke: #16a34a; }
      .blue { stroke: #0284c7; }
      .purple { stroke: #9333ea; }
      .red { stroke: #dc2626; }
      .orange { stroke: #f97316; }
      .black { stroke: #111827; }
      .gray { stroke: #64748b; }
      .yellow { stroke: #ca8a04; stroke-dasharray: 12 8; }
      .wire { fill: none; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #fff; stroke: #111827; stroke-width: 2; }
      .legend-swatch { fill: none; stroke-width: 5; stroke-linecap: round; }
    </style>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#0284c7"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#9333ea"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#f97316"/>
    </marker>
    <marker id="arrow-black" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#111827"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#ca8a04"/>
    </marker>
  </defs>

  <rect width="1400" height="920" class="bg"/>
  <g opacity=".65">
    <path class="grid" d="M0 40H1400M0 80H1400M0 120H1400M0 160H1400M0 200H1400M0 240H1400M0 280H1400M0 320H1400M0 360H1400M0 400H1400M0 440H1400M0 480H1400M0 520H1400M0 560H1400M0 600H1400M0 640H1400M0 680H1400M0 720H1400M0 760H1400M0 800H1400M0 840H1400M0 880H1400"/>
    <path class="grid" d="M40 0V920M80 0V920M120 0V920M160 0V920M200 0V920M240 0V920M280 0V920M320 0V920M360 0V920M400 0V920M440 0V920M480 0V920M520 0V920M560 0V920M600 0V920M640 0V920M680 0V920M720 0V920M760 0V920M800 0V920M840 0V920M880 0V920M920 0V920M960 0V920M1000 0V920M1040 0V920M1080 0V920M1120 0V920M1160 0V920M1200 0V920M1240 0V920M1280 0V920M1320 0V920M1360 0V920"/>
  </g>

  <text x="40" y="52" class="header">BC-250 ESP32 wiring with optional LED/ARGB power gate</text>
  <text x="40" y="82" class="small">Updated wiring reference. LED power is external and switched by a separate MOSFET/load switch, not by the relay outputs.</text>

  <rect x="54" y="132" width="328" height="624" rx="14" class="box"/>
  <text x="82" y="170" class="title">ESP32 + 2-channel relay board</text>
  <rect x="92" y="202" width="252" height="92" rx="10" class="subbox"/>
  <text x="124" y="238" class="title">ESP32 module</text>
  <text x="116" y="266" class="small">Firmware pin authority: pins.h</text>
  <rect x="92" y="330" width="252" height="74" rx="10" class="subbox"/>
  <text x="124" y="362" class="title">Relay 1</text>
  <text x="124" y="388" class="small">ATX PSU control</text>
  <rect x="92" y="440" width="252" height="74" rx="10" class="subbox"/>
  <text x="124" y="472" class="title">Relay 2</text>
  <text x="124" y="498" class="small">BC-250 button pulse</text>
  <rect x="92" y="556" width="252" height="162" rx="10" class="subbox"/>
  <text x="124" y="588" class="title">Local I/O</text>
  <text x="124" y="618" class="pin">GPIO22 BUTTON_PIN</text>
  <text x="124" y="644" class="pin">GPIO23 POWER_LED_PIN</text>
  <text x="124" y="670" class="pin">GPIO2 STATUS_LED_PIN</text>
  <text x="124" y="696" class="pin">GND</text>

  <rect x="504" y="126" width="340" height="206" rx="14" class="box"/>
  <text x="532" y="166" class="title">BC-250 TPMS1 connector</text>
  <text x="532" y="204" class="pin">Pin 9 monitor signal</text>
  <text x="532" y="232" class="txt">to ESP32 GPIO4 PC_MONITOR_PIN</text>
  <text x="532" y="270" class="pin">Pin 17 GND</text>
  <text x="532" y="298" class="txt">shared with controller ground</text>

  <rect x="504" y="386" width="340" height="180" rx="14" class="box"/>
  <text x="532" y="426" class="title">BC-250 power button pads</text>
  <text x="532" y="466" class="txt">Relay 2 closes these pads briefly</text>
  <text x="532" y="500" class="pin">GPIO17 EXTRA_PIN</text>
  <text x="532" y="528" class="txt">drives relay 2 input only</text>

  <rect x="504" y="622" width="340" height="134" rx="14" class="box"/>
  <text x="532" y="662" class="title">Momentary local button / LEDs</text>
  <text x="532" y="700" class="txt">Button is active LOW to GND</text>
  <text x="532" y="728" class="txt">Case LEDs are indicators only</text>

  <rect x="948" y="126" width="354" height="250" rx="14" class="box"/>
  <text x="976" y="166" class="title">ATX PSU connector</text>
  <text x="976" y="208" class="pin">PS_ON</text>
  <text x="976" y="236" class="txt">switched through relay 1</text>
  <text x="976" y="278" class="pin">GND</text>
  <text x="976" y="306" class="txt">relay / ESP32 common ground</text>
  <text x="976" y="344" class="pin">+5VSB</text>

  <rect x="948" y="450" width="354" height="306" rx="14" class="box"/>
  <text x="976" y="490" class="title">Optional LED/ARGB power</text>
  <text x="976" y="528" class="pin">External 5V LED PSU</text>
  <text x="976" y="558" class="pin">Fuse</text>
  <text x="976" y="588" class="pin">MOSFET / load switch</text>
  <text x="976" y="618" class="pin">LED / ARGB load</text>
  <text x="976" y="654" class="warn">Do not power LEDs from GPIO</text>
  <text x="976" y="686" class="txt">LED_POWER_PIN is disabled by default (-1)</text>
  <text x="976" y="716" class="txt">Assign a GPIO only after wiring is verified</text>

  <rect x="54" y="802" width="1248" height="80" rx="12" class="box"/>
  <text x="82" y="834" class="title">Legend</text>
  <path d="M190 826H245" class="legend-swatch green"/><text x="258" y="832" class="small">PS_ON / relay control</text>
  <path d="M430 826H485" class="legend-swatch blue"/><text x="498" y="832" class="small">GPIO control</text>
  <path d="M630 826H685" class="legend-swatch purple"/><text x="698" y="832" class="small">monitor / standby</text>
  <path d="M850 826H905" class="legend-swatch orange"/><text x="918" y="832" class="small">external LED +5V</text>
  <path d="M1090 826H1145" class="legend-swatch black"/><text x="1158" y="832" class="small">ground</text>
  <path d="M190 858H245" class="legend-swatch yellow"/><text x="258" y="864" class="small">future ARGB data, separate from power gate</text>

  <path d="M344 366H948" class="wire green" marker-end="url(#arrow-green)"/>
  <text x="405" y="354" class="small">GPIO16 OPTO_PIN -> relay 1 -> PS_ON</text>
  <path d="M344 478H504" class="wire blue" marker-end="url(#arrow-blue)"/>
  <text x="368" y="466" class="small">GPIO17 EXTRA_PIN</text>
  <path d="M504 216H344" class="wire purple" marker-end="url(#arrow-purple)"/>
  <text x="370" y="202" class="small">GPIO4 PC_MONITOR_PIN</text>
  <path d="M344 618H504" class="wire blue" marker-end="url(#arrow-blue)"/>
  <path d="M344 644H504" class="wire blue" marker-end="url(#arrow-blue)"/>
  <path d="M344 670H504" class="wire blue" marker-end="url(#arrow-blue)"/>
  <path d="M344 696H504" class="wire black" marker-end="url(#arrow-black)"/>

  <path d="M844 270H948" class="wire black" marker-end="url(#arrow-black)"/>
  <text x="860" y="258" class="small">common GND</text>
  <path d="M948 344H844" class="wire purple" marker-end="url(#arrow-purple)"/>
  <text x="852" y="332" class="small">+5VSB reference</text>

  <path d="M344 696V776H1125V756" class="wire black" marker-end="url(#arrow-black)"/>
  <text x="690" y="768" class="small">shared ground: ESP32 GND + LED PSU GND + LED load GND</text>
  <path d="M344 588V602H948" class="wire blue" marker-end="url(#arrow-blue)"/>
  <text x="530" y="590" class="small">LED_POWER_PIN -> MOSFET/load-switch gate or enable</text>
  <path d="M1125 528V558V588V618" class="wire orange" marker-end="url(#arrow-orange)"/>
  <text x="1142" y="575" class="small">fused external 5V feed</text>
  <path d="M344 670C600 710 820 710 948 618" class="thin yellow" marker-end="url(#arrow-yellow)"/>
  <text x="642" y="706" class="small">future ARGB data pin, not enabled yet</text>
</svg>
