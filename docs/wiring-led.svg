<svg xmlns="http://www.w3.org/2000/svg" width="909" height="541" viewBox="0 0 909 541" role="img" aria-labelledby="title desc">
  <title id="title">BC-250 ESP32 relay board wiring</title>
  <desc id="desc">Board-layout wiring diagram matching the reference image. GPIO16 OPTO_PIN drives relay 1 for PS_ON, GPIO17 EXTRA_PIN drives relay 2 for the BC-250 power button, GPIO4 PC_MONITOR_PIN monitors TPMS1 pin 9, GPIO22 BUTTON_PIN reads the momentary button, GPIO23 POWER_LED_PIN drives the button LED, GPIO2 STATUS_LED_PIN is optional status, and LED_POWER_PIN is disabled by default unless wired to a MOSFET or load switch.</desc>
  <defs>
    <pattern id="small-grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M16 0H0V16" fill="none" stroke="#d9d9d9" stroke-width="1"/>
    </pattern>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="url(#small-grid)"/>
      <path d="M80 0H0V80" fill="none" stroke="#c9c9c9" stroke-width="1.2"/>
    </pattern>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#8b8b8b" flood-opacity=".35"/>
    </filter>
    <style>
      .bg { fill: #f2f2f2; }
      .label-box { fill: #fff; stroke: #ededed; stroke-width: 1; filter: url(#shadow); }
      .label { fill: #0f172a; font: 700 14px "Courier New", monospace; letter-spacing: 0; }
      .small { fill: #0f172a; font: 700 11px Arial, sans-serif; letter-spacing: 0; }
      .tiny { fill: #0f172a; font: 700 9px Arial, sans-serif; letter-spacing: 0; }
      .note { fill: #334155; font: 9px Arial, sans-serif; letter-spacing: 0; }
      .warn { fill: #b91c1c; font: 700 9px Arial, sans-serif; letter-spacing: 0; }
      .white-text { fill: #fff; }
      .red-text { fill: #ff1d1d; }
      .green-text { fill: #118a20; }
      .purple-text { fill: #a318a8; }
      .board { fill: #0b6fb3; stroke: #07517d; stroke-width: 2; filter: url(#shadow); }
      .board-edge { fill: none; stroke: #8bd9ff; stroke-width: 2; opacity: .65; }
      .module { fill: #d1d5db; stroke: #64748b; stroke-width: 1.4; }
      .chip { fill: #d8d8d8; stroke: #2f3640; stroke-width: 1.3; }
      .relay { fill: #86c8e6; stroke: #286485; stroke-width: 1.4; }
      .relay-label { fill: #fff; font: 700 9px Arial, sans-serif; letter-spacing: 0; }
      .terminal { fill: #d8edf5; stroke: #7998a6; stroke-width: 1.4; }
      .terminal-hole { fill: #f8fafc; stroke: #6b7280; stroke-width: 1.2; }
      .solder { fill: #dfe9f4; stroke: #b8c8d8; stroke-width: 1.2; }
      .pad { fill: #fff; stroke: #94a3b8; stroke-width: 1.3; }
      .header { fill: #233248; stroke: #0f172a; stroke-width: 1; }
      .pin { fill: #cbd5e1; stroke: #334155; stroke-width: 1; }
      .wire { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .thinwire { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .green { stroke: #37d21e; }
      .red { stroke: #ff1d1d; }
      .orange { stroke: #ff8a1c; }
      .black { stroke: #050505; }
      .brown { stroke: #5b160f; }
      .purple { stroke: #a318a8; }
      .blue { stroke: #0284c7; }
      .node { fill: #fff; stroke-width: 2; }
    </style>
  </defs>

  <rect width="909" height="541" class="bg"/>
  <rect width="909" height="541" fill="url(#grid)" opacity=".92"/>

  <g id="top-labels">
    <rect x="18" y="16" width="256" height="37" rx="3" class="label-box"/>
    <text x="28" y="38" class="label">MOMENTARY LED POWER BUTTON</text>

    <rect x="289" y="15" width="214" height="38" rx="3" class="label-box"/>
    <text x="302" y="38" class="label">BC-250 TPMS1 CONNECTOR</text>

    <rect x="545" y="15" width="342" height="38" rx="3" class="label-box"/>
    <text x="557" y="38" class="label">BC-250 POWER BUTTON PADS</text>
  </g>

  <g id="momentary-button">
    <rect x="75" y="80" width="32" height="84" rx="4" fill="#f8fafc" filter="url(#shadow)"/>
    <rect x="130" y="80" width="32" height="84" rx="4" fill="#f8fafc" filter="url(#shadow)"/>
    <text x="89" y="101" class="small red-text">+</text>
    <text x="145" y="101" class="small">-</text>
    <rect x="72" y="109" width="94" height="58" rx="4" class="solder"/>
    <circle cx="91" cy="127" r="5" class="node orange"/>
    <circle cx="119" cy="127" r="5" class="terminal-hole"/>
    <circle cx="150" cy="127" r="5" class="node brown"/>
    <circle cx="91" cy="155" r="5" class="node black"/>
    <circle cx="119" cy="155" r="5" class="terminal-hole"/>
    <circle cx="150" cy="155" r="5" class="terminal-hole"/>
  </g>

  <g id="tpms1-connector">
    <text x="310" y="74" class="small">17</text>
    <text x="402" y="74" class="small">9</text>
    <rect x="305" y="84" width="176" height="18" rx="1" class="header"/>
    <g>
      <circle cx="320" cy="93" r="5" class="pin"/>
      <circle cx="341" cy="93" r="5" class="pin"/>
      <circle cx="362" cy="93" r="5" class="pin"/>
      <circle cx="383" cy="93" r="5" class="pin"/>
      <circle cx="404" cy="93" r="5" class="pin"/>
      <circle cx="425" cy="93" r="5" class="pin"/>
      <circle cx="446" cy="93" r="5" class="pin"/>
      <circle cx="467" cy="93" r="5" class="pin"/>
    </g>
  </g>

  <g id="power-button-pads">
    <rect x="662" y="67" width="126" height="96" rx="3" fill="#dfe9f4" opacity=".78"/>
    <circle cx="677" cy="80" r="6" class="pad"/>
    <circle cx="707" cy="80" r="6" class="pad"/>
    <circle cx="738" cy="80" r="6" class="pad"/>
    <circle cx="768" cy="80" r="6" class="pad"/>
    <circle cx="707" cy="111" r="6" class="pad"/>
    <circle cx="738" cy="111" r="6" class="pad"/>
    <circle cx="707" cy="142" r="6" class="pad"/>
    <circle cx="738" cy="142" r="6" class="pad"/>
  </g>

  <g id="relay-board">
    <rect x="170" y="198" width="436" height="278" rx="2" class="board"/>
    <rect x="176" y="204" width="424" height="266" rx="2" class="board-edge"/>

    <rect x="178" y="210" width="44" height="134" rx="2" fill="#153d7a" stroke="#082f65" stroke-width="1.4"/>
    <g fill="#a8b3c0" stroke="#5c6672" stroke-width="1">
      <circle cx="189" cy="222" r="4"/><circle cx="189" cy="238" r="4"/><circle cx="189" cy="254" r="4"/><circle cx="189" cy="270" r="4"/>
      <circle cx="189" cy="286" r="4"/><circle cx="189" cy="302" r="4"/><circle cx="189" cy="318" r="4"/><circle cx="189" cy="334" r="4"/>
      <circle cx="210" cy="222" r="4"/><circle cx="210" cy="238" r="4"/><circle cx="210" cy="254" r="4"/><circle cx="210" cy="270" r="4"/>
      <circle cx="210" cy="286" r="4"/><circle cx="210" cy="302" r="4"/><circle cx="210" cy="318" r="4"/><circle cx="210" cy="334" r="4"/>
    </g>

    <rect x="229" y="219" width="128" height="128" rx="5" class="module"/>
    <rect x="232" y="222" width="122" height="122" rx="2" class="chip"/>
    <text x="267" y="291" class="small">ESP32</text>
    <rect x="346" y="212" width="22" height="138" rx="2" fill="#f4f4f4" opacity=".95"/>
    <g fill="#cbd5e1" stroke="#334155" stroke-width=".8">
      <circle cx="356" cy="226" r="3"/><circle cx="356" cy="238" r="3"/><circle cx="356" cy="250" r="3"/><circle cx="356" cy="262" r="3"/>
      <circle cx="356" cy="274" r="3"/><circle cx="356" cy="286" r="3"/><circle cx="356" cy="298" r="3"/><circle cx="356" cy="310" r="3"/>
      <circle cx="356" cy="322" r="3"/><circle cx="356" cy="334" r="3"/>
    </g>

    <rect x="383" y="181" width="108" height="34" rx="4" class="terminal"/>
    <circle cx="408" cy="198" r="8" class="terminal-hole"/>
    <circle cx="446" cy="198" r="8" class="terminal-hole"/>
    <circle cx="480" cy="198" r="8" class="terminal-hole"/>
    <rect x="498" y="181" width="108" height="34" rx="4" class="terminal"/>
    <circle cx="523" cy="198" r="8" class="terminal-hole"/>
    <circle cx="560" cy="198" r="8" class="terminal-hole"/>
    <circle cx="594" cy="198" r="8" class="terminal-hole"/>

    <rect x="404" y="214" width="95" height="132" rx="7" class="relay"/>
    <rect x="514" y="214" width="95" height="132" rx="7" class="relay"/>
    <text x="424" y="279" class="relay-label">RELAY 1</text>
    <text x="534" y="279" class="relay-label">RELAY 2</text>

    <rect x="488" y="437" width="118" height="38" rx="4" class="terminal"/>
    <circle cx="528" cy="458" r="8" class="terminal-hole"/>
    <circle cx="560" cy="458" r="8" class="terminal-hole"/>
    <text x="491" y="428" class="small white-text">VCC GND 5V</text>

    <rect x="206" y="381" width="45" height="36" rx="4" fill="#8a8a8a" stroke="#555"/>
    <circle cx="229" cy="399" r="12" fill="#bcbcbc" stroke="#666"/>
    <text x="199" y="439" class="small white-text">EN</text>
    <rect x="205" y="423" width="48" height="36" rx="4" fill="#6f7782" stroke="#4b5563"/>

    <rect x="292" y="407" width="35" height="27" rx="3" fill="#9ca3af" stroke="#4b5563"/>
    <rect x="346" y="407" width="35" height="27" rx="3" fill="#9ca3af" stroke="#4b5563"/>
    <rect x="421" y="409" width="35" height="20" rx="2" fill="#bfc5cc" stroke="#64748b"/>
    <circle cx="474" cy="451" r="21" fill="#d9d9d9" stroke="#64748b" stroke-width="2"/>

    <text x="365" y="243" class="tiny">GPIO4 PC_MONITOR_PIN</text>
    <text x="365" y="257" class="tiny">GPIO16 OPTO_PIN</text>
    <text x="365" y="271" class="tiny">GPIO17 EXTRA_PIN</text>
    <text x="365" y="285" class="tiny">GPIO22 BUTTON_PIN</text>
    <text x="365" y="299" class="tiny">GPIO23 POWER_LED_PIN</text>
    <text x="365" y="313" class="tiny">GPIO2 STATUS_LED_PIN</text>
  </g>

  <g id="psu-connector">
    <rect x="688" y="181" width="142" height="40" rx="3" class="label-box"/>
    <text x="705" y="206" class="label">PSU CONNECTOR</text>
    <rect x="747" y="225" width="72" height="101" rx="3" class="label-box"/>
    <text x="762" y="250" class="small">GND</text>
    <text x="762" y="280" class="small green-text">PS_ON</text>
    <text x="762" y="309" class="small purple-text">+5VSB</text>
    <text x="762" y="340" class="small">GND</text>
    <circle cx="738" cy="244" r="5" class="node black"/>
    <circle cx="738" cy="276" r="5" class="node green"/>
    <circle cx="738" cy="306" r="5" class="node purple"/>
    <circle cx="738" cy="336" r="5" class="node black"/>
  </g>

  <g id="source-like-wires">
    <path class="wire green" d="M121 96 V66 H280 V291 H356"/>
    <path class="thinwire orange" d="M91 127 V164 H377 V198 H408"/>
    <path class="wire black" d="M91 155 V184 H318 V102"/>
    <path class="wire brown" d="M150 127 V184 H427 V198"/>

    <path class="wire black" d="M320 102 V139 H407"/>
    <path class="wire red" d="M404 93 V119 H348 V242 H356"/>
    <path class="wire brown" d="M407 139 V183 H446 V198"/>

    <path class="wire green" d="M560 198 V134 H737 V80"/>
    <path class="wire black" d="M523 198 V170 H662 V244 H738"/>
    <path class="wire green" d="M594 198 H626 V276 H738"/>

    <path class="wire purple" d="M560 458 V502 H692 V306 H738"/>
    <path class="wire black" d="M528 458 V524 H738 V336"/>
  </g>

  <g id="net-labels">
    <rect x="25" y="486" width="418" height="43" rx="4" class="label-box"/>
    <text x="36" y="500" class="note">BUTTON_PIN: GPIO22 to GND. POWER_LED_PIN: GPIO23.</text>
    <text x="36" y="512" class="note">STATUS_LED_PIN: GPIO2. Relay 1: GPIO16 OPTO_PIN to PS_ON.</text>
    <text x="36" y="524" class="note">Relay 2: GPIO17 EXTRA_PIN to BC-250 power pads.</text>

    <rect x="456" y="486" width="416" height="43" rx="4" class="label-box"/>
    <text x="468" y="500" class="warn">LED_POWER_PIN is -1 by default.</text>
    <text x="468" y="512" class="note">GPIO must not power LED load current. Use external fused 5V,</text>
    <text x="468" y="524" class="note">MOSFET/load switch, and common GND for LED/ARGB power.</text>
  </g>
</svg>
