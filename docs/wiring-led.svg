<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">BC-250 ESP32 relay wiring with optional LED power gate</title>
  <desc id="desc">Board-layout wiring diagram showing an ESP32 two-relay board, BC-250 power wiring, ATX PSU connector, and optional external LED power gate.</desc>
  <defs>
    <pattern id="small-grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M12 0H0V12" fill="none" stroke="#d9dee7" stroke-width="1"/>
    </pattern>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="url(#small-grid)"/>
      <path d="M60 0H0V60" fill="none" stroke="#bfc7d3" stroke-width="1.2"/>
    </pattern>
    <style>
      .bg { fill: #f2f4f7; }
      .labelbox { fill: #fff; stroke: #dde3ec; stroke-width: 1.5; }
      .board { fill: #0c62a4; stroke: #07436f; stroke-width: 4; }
      .board-hi { fill: none; stroke: #d8f3ff; stroke-width: 5; opacity: .6; }
      .espmod { fill: #d8dde5; stroke: #7e8a99; stroke-width: 2; }
      .chip { fill: #2a3038; stroke: #111827; stroke-width: 2; }
      .relay { fill: #77a9d0; stroke: #2f638d; stroke-width: 2; }
      .terminal { fill: #dff4fa; stroke: #7fb2c2; stroke-width: 2; }
      .hole { fill: #f8fafc; stroke: #7b8794; stroke-width: 2; }
      .component { fill: #cfd8e3; stroke: #758195; stroke-width: 1.5; }
      .title { fill: #111827; font: 700 20px 'Courier New', monospace; }
      .label { fill: #111827; font: 700 15px 'Courier New', monospace; }
      .small { fill: #111827; font: 700 12px Arial, sans-serif; }
      .note { fill: #334155; font: 13px Arial, sans-serif; }
      .warn { fill: #b91c1c; font: 700 13px Arial, sans-serif; }
      .wire { fill: none; stroke-width: 5.5; stroke-linecap: round; stroke-linejoin: round; }
      .thinwire { fill: none; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
      .green { stroke: #39d353; }
      .red { stroke: #ef4444; }
      .orange { stroke: #f97316; }
      .black { stroke: #111827; }
      .brown { stroke: #5b1b12; }
      .purple { stroke: #a21caf; }
      .blue { stroke: #0ea5e9; }
      .yellow { stroke: #eab308; stroke-dasharray: 10 8; }
      .node { fill: #fff; stroke-width: 3; }
    </style>
  </defs>

  <rect width="1400" height="820" class="bg"/>
  <rect width="1400" height="820" fill="url(#grid)" opacity=".72"/>

  <rect x="26" y="24" width="302" height="44" rx="7" class="labelbox"/>
  <text x="42" y="52" class="title">MOMENTARY LED POWER BUTTON</text>

  <rect x="456" y="24" width="286" height="44" rx="7" class="labelbox"/>
  <text x="474" y="52" class="title">BC-250 TPMS1 CONNECTOR</text>

  <rect x="830" y="24" width="404" height="44" rx="7" class="labelbox"/>
  <text x="850" y="52" class="title">BC-250 POWER BUTTON SOLDERING POINTS</text>

  <rect x="1090" y="256" width="178" height="210" rx="8" class="labelbox"/>
  <text x="1114" y="288" class="label">PSU CONNECTOR</text>
  <text x="1142" y="335" class="small">GND</text>
  <text x="1132" y="380" class="small" fill="#087f23">PS_ON</text>
  <text x="1130" y="425" class="small" fill="#a21caf">+5VSB</text>

  <rect x="72" y="105" width="108" height="112" rx="10" class="labelbox"/>
  <text x="106" y="134" class="small" fill="#ef4444">+</text>
  <text x="148" y="134" class="small">-</text>
  <circle cx="104" cy="172" r="9" class="hole"/>
  <circle cx="152" cy="172" r="9" class="hole"/>
  <circle cx="128" cy="202" r="9" class="hole"/>

  <rect x="480" y="96" width="280" height="28" class="terminal"/>
  <text x="486" y="90" class="small">17</text>
  <text x="610" y="90" class="small">9</text>
  <circle cx="502" cy="110" r="7" class="hole"/>
  <circle cx="536" cy="110" r="7" class="hole"/>
  <circle cx="570" cy="110" r="7" class="hole"/>
  <circle cx="604" cy="110" r="7" class="hole"/>
  <circle cx="638" cy="110" r="7" class="hole"/>
  <circle cx="672" cy="110" r="7" class="hole"/>
  <circle cx="706" cy="110" r="7" class="hole"/>
  <circle cx="740" cy="110" r="7" class="hole"/>

  <g transform="translate(948 92)">
    <rect x="0" y="0" width="168" height="156" rx="8" class="terminal"/>
    <circle cx="36" cy="32" r="11" class="hole"/>
    <circle cx="80" cy="32" r="11" class="hole"/>
    <circle cx="124" cy="32" r="11" class="hole"/>
    <circle cx="36" cy="78" r="11" class="hole"/>
    <circle cx="80" cy="78" r="11" class="hole"/>
    <circle cx="36" cy="124" r="11" class="hole"/>
    <circle cx="80" cy="124" r="11" class="hole"/>
  </g>

  <g id="esp32-two-relay-board" transform="translate(235 270)">
    <rect x="0" y="0" width="720" height="360" rx="10" class="board"/>
    <rect x="12" y="12" width="696" height="336" rx="10" class="board-hi"/>

    <rect x="72" y="58" width="214" height="190" rx="6" class="espmod"/>
    <rect x="112" y="96" width="134" height="112" rx="3" class="chip"/>
    <text x="122" y="154" class="small" fill="#fff">ESP32</text>
    <rect x="28" y="72" width="28" height="210" rx="4" class="component"/>
    <g fill="#d1d5db" stroke="#6b7280" stroke-width="1.5">
      <circle cx="42" cy="94" r="6"/><circle cx="42" cy="120" r="6"/><circle cx="42" cy="146" r="6"/><circle cx="42" cy="172" r="6"/>
      <circle cx="42" cy="198" r="6"/><circle cx="42" cy="224" r="6"/><circle cx="42" cy="250" r="6"/>
      <circle cx="310" cy="94" r="6"/><circle cx="310" cy="120" r="6"/><circle cx="310" cy="146" r="6"/><circle cx="310" cy="172" r="6"/>
      <circle cx="310" cy="198" r="6"/><circle cx="310" cy="224" r="6"/><circle cx="310" cy="250" r="6"/>
    </g>

    <rect x="374" y="66" width="142" height="156" rx="8" class="relay"/>
    <rect x="548" y="66" width="142" height="156" rx="8" class="relay"/>
    <text x="402" y="136" class="small" fill="#fff">RELAY 1</text>
    <text x="576" y="136" class="small" fill="#fff">RELAY 2</text>

    <rect x="360" y="18" width="156" height="56" rx="6" class="terminal"/>
    <rect x="534" y="18" width="156" height="56" rx="6" class="terminal"/>
    <circle cx="392" cy="46" r="10" class="hole"/>
    <circle cx="438" cy="46" r="10" class="hole"/>
    <circle cx="484" cy="46" r="10" class="hole"/>
    <circle cx="566" cy="46" r="10" class="hole"/>
    <circle cx="612" cy="46" r="10" class="hole"/>
    <circle cx="658" cy="46" r="10" class="hole"/>

    <rect x="504" y="292" width="180" height="48" rx="6" class="terminal"/>
    <text x="526" y="322" class="small">VCC  GND  5V</text>
    <circle cx="596" cy="316" r="10" class="hole"/>
    <circle cx="650" cy="316" r="10" class="hole"/>

    <circle cx="315" cy="92" r="5" fill="#ef4444"/>
    <text x="324" y="96" class="small">GPIO4 PC_MONITOR_PIN</text>
    <circle cx="315" cy="132" r="5" fill="#39d353"/>
    <text x="324" y="136" class="small">GPIO16 OPTO_PIN</text>
    <circle cx="315" cy="172" r="5" fill="#0ea5e9"/>
    <text x="324" y="176" class="small">GPIO17 EXTRA_PIN</text>
    <circle cx="315" cy="212" r="5" fill="#0ea5e9"/>
    <text x="324" y="216" class="small">LED_POWER_PIN</text>
  </g>

  <rect x="760" y="632" width="520" height="134" rx="8" class="labelbox"/>
  <text x="782" y="662" class="label">OPTIONAL LED/ARGB POWER GATE</text>
  <text x="782" y="686" class="note">External 5V LED PSU + fuse + MOSFET/load switch + LED/ARGB load</text>
  <text x="782" y="710" class="warn">DO NOT POWER LEDS FROM GPIO</text>
  <text x="782" y="734" class="note">LED_POWER_PIN is disabled by default (-1) until wiring is verified</text>

  <rect x="802" y="560" width="134" height="44" rx="7" class="labelbox"/>
  <text x="820" y="587" class="small">5V LED PSU</text>
  <rect x="980" y="560" width="74" height="44" rx="7" class="labelbox"/>
  <text x="1000" y="587" class="small">FUSE</text>
  <rect x="800" y="704" width="198" height="42" rx="7" class="labelbox"/>
  <text x="816" y="731" class="small">MOSFET / LOAD SWITCH</text>
  <rect x="1080" y="704" width="150" height="42" rx="7" class="labelbox"/>
  <text x="1097" y="731" class="small">LED / ARGB LOAD</text>

  <circle cx="1150" cy="330" r="6" class="node black"/>
  <circle cx="1150" cy="375" r="6" class="node green"/>
  <circle cx="1150" cy="420" r="6" class="node purple"/>
  <circle cx="1150" cy="462" r="6" class="node black"/>

  <path class="wire green" d="M146 105 L146 72 L548 72 L548 402"/>
  <path class="wire red" d="M104 172 L104 236 L550 236 L550 362"/>
  <path class="wire brown" d="M152 172 L152 255 L612 255 L612 362"/>
  <path class="wire black" d="M128 202 L128 300 L235 300"/>

  <path class="wire red" d="M638 96 L638 70 L638 362"/>
  <path class="wire brown" d="M502 124 L502 238 L850 238 L850 362"/>

  <path class="wire green" d="M984 92 L984 70 L842 70 L842 362"/>
  <path class="wire black" d="M990 170 L990 256 L955 256"/>
  <path class="wire green" d="M1028 170 L1028 375 L1150 375"/>
  <path class="wire black" d="M847 362 L847 330 L1150 330"/>
  <path class="wire purple" d="M1150 420 L1150 560 L870 560"/>
  <path class="wire black" d="M1150 462 L1150 626 L870 626 L870 604"/>

  <path class="wire black" d="M831 586 L831 654 L596 654 L596 586"/>
  <path class="wire purple" d="M650 586 L650 622 L1080 622 L1080 420"/>

  <path class="thinwire blue" d="M550 482 L550 724 L800 724"/>
  <text x="568" y="714" class="small" fill="#0ea5e9">LED_POWER_PIN gate / enable</text>
  <path class="wire orange" d="M936 582 L980 582"/>
  <path class="wire orange" d="M1054 582 L1155 582 L1155 704"/>
  <path class="wire orange" d="M998 724 L1080 724"/>
  <path class="wire black" d="M880 604 L880 684 L800 684 L800 724"/>
  <path class="wire black" d="M1155 746 L1155 782 L831 782 L831 604"/>
  <path class="thinwire yellow" d="M590 482 C760 510 950 600 1155 704"/>
  <text x="910" y="610" class="small" fill="#b45309">future ARGB data line, not enabled yet</text>
</svg>
