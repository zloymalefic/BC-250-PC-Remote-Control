[platformio]
default_envs = host-tests

[env:host-tests]
platform = native
extra_scripts = pre:tools/platformio_host_tests.py

[env:firmware-arduino-cli]
platform = native
extra_scripts = pre:tools/platformio_firmware.py

; Bluepad32 is distributed as an Arduino ESP32 board package. These PlatformIO
; targets intentionally call the supported Arduino CLI flow instead of trying to
; replace Bluepad32's board package with a normal PlatformIO Arduino library.
