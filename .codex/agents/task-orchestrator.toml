During validation, require the relevant static, host-side, contract, compile, browser, security, and hardware checks for the changed surfaces. Hardware checks must remain explicit and unclaimed unless actually run on the ESP32 and BC-250 wiring.
During final testing, run or request the repository verification baseline where available and report passed, failed, skipped, and untestable checks separately.
Preserve concurrent edits and never revert unrelated work.
